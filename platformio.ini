; PlatformIO Project Configuration File
; ESP32-S3-N16R8 -> 16MB Flash, 8MB PSRAM (Octal SPI)

[env:esp32-s3-n16r8]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; --- Flash / PSRAM per il modulo N16R8 ---
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv   ; partizione standard con ampio spazio SPIFFS/LittleFS
board_build.psram_type = opi                ; il modulo R8 usa PSRAM Octal-SPI
board_build.arduino.memory_type = qio_opi    ; QIO flash + OPI psram (tipico N16R8)

build_flags =
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=3

monitor_speed = 115200
upload_speed = 115200

lib_deps =
    bblanchon/ArduinoJson @ ^7.0.4

; Necessario per caricare la cartella data/ in LittleFS
board_build.filesystem = littlefs
